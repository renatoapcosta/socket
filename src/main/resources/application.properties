# ============================================================
#  Socker — GwCel TCP Socket ISO 8583
#  application.properties
# ============================================================

# --- Server ---
# TCP port the server listens on
server.port=9000

# TCP backlog (OS-level accept queue)
server.backlog=256

# Read timeout for each client connection (ms)
# Connections that are silent for this long are closed
server.read.timeout.ms=30000

# Maximum ISO payload size accepted (bytes)
# Payloads larger than this are rejected without reading, protecting against memory exhaustion
server.max.payload.bytes=8192

# --- Client ---
# GwCel host (used when this system acts as Concentrador)
client.host=127.0.0.1

# GwCel TCP port
client.port=9000

# TCP connect timeout (ms)
client.connect.timeout.ms=5000

# Read timeout when waiting for a GwCel response (ms)
# For saque com telefone, use >= 60000
client.read.timeout.ms=30000

# Maximum ISO response payload size (bytes)
client.max.payload.bytes=8192

# --- Connection Pool ---
# Minimum number of pre-warmed persistent connections
pool.min.size=5

# Maximum concurrent connections to GwCel
# Sized for 20.000 req/min (~333 req/s). Assuming average 50ms response:
#   333 req/s × 0.05s = ~17 concurrent; 50 gives comfortable headroom.
pool.max.size=50

# Maximum time (ms) a thread waits to borrow a connection
pool.borrow.timeout.ms=5000

# Connections idle longer than this (ms) will be validated and possibly evicted
pool.idle.timeout.ms=60000

# Delay (ms) before attempting reconnection after a connection failure
pool.reconnect.delay.ms=2000

# --- Logging ---
# Set to true to log full payload hex in DEBUG level.
# WARNING: may expose sensitive data. Never enable in production.
log.debug.payload=false
