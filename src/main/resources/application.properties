# ============================================================
#  Socker — GwCel TCP Socket ISO 8583
#  application.properties
# ============================================================

# --- Server ---
# TCP port the server listens on
server.port=6003

# TCP backlog (OS-level accept queue)
server.backlog=256

# Read timeout for each client connection (ms)
# Connections that are silent for this long are closed
server.read.timeout.ms=30000

# Maximum ISO payload size accepted (bytes)
# Payloads larger than this are rejected without reading, protecting against memory exhaustion
server.max.payload.bytes=8192

# --- Client ---
# GwCel host (used when this system acts as Concentrador)
client.host=127.0.0.1

# GwCel TCP port
client.port=6003

# TCP connect timeout (ms)
client.connect.timeout.ms=5000

# Read timeout when waiting for a GwCel response (ms)
# For saque com telefone, use >= 60000
client.read.timeout.ms=30000

# Maximum ISO response payload size (bytes)
client.max.payload.bytes=8192

# --- Connection Pool ---
# Minimum number of pre-warmed persistent connections
pool.min.size=5

# Maximum concurrent connections to GwCel
# Sized for 20.000 req/min (~333 req/s). Assuming average 50ms response:
#   333 req/s × 0.05s = ~17 concurrent; 50 gives comfortable headroom.
pool.max.size=50

# Maximum time (ms) a thread waits to borrow a connection
pool.borrow.timeout.ms=5000

# Connections idle longer than this (ms) will be validated and possibly evicted
pool.idle.timeout.ms=60000

# Delay (ms) before attempting reconnection after a connection failure
pool.reconnect.delay.ms=2000

# --- Async Multiplexed Client ---
# Minimum number of pre-warmed MultiplexedConnection instances
async.pool.min.connections=2

# Maximum simultaneous MultiplexedConnection instances
async.pool.max.connections=10

# Maximum concurrent in-flight requests per MultiplexedConnection.
# With 10 connections × 100 in-flight = 1,000 simultaneous pending requests.
# Governs the Semaphore inside each MultiplexedConnection.
async.pool.max.inflight.per.connection=100

# Per-request response timeout in milliseconds.
# Implemented via CompletableFuture.orTimeout(). The TCP socket has SO_TIMEOUT=0;
# this is the only timeout mechanism for responses on async connections.
async.client.request.timeout.ms=30000

# Maximum time a caller waits to acquire an in-flight semaphore slot (ms).
# If all slots are full within this window, sendAsync throws IOException.
async.client.borrow.timeout.ms=5000

# Delay (ms) before attempting to re-open a dead connection
async.pool.reconnect.delay.ms=2000

# How long the synchronous send() method blocks while awaiting the async future.
# Should be slightly greater than async.client.request.timeout.ms.
async.await.timeout.ms=32000

# --- REST Server ---
# Port for the embedded Javalin/Jetty HTTP server
rest.server.port=8080

# --- Session Management ---
# Maximum number of outbound messages per session queue.
# When this limit is reached, the REST endpoint returns HTTP 429.
session.queue.capacity=500

# --- Logging ---
# Set to true to log full payload hex in DEBUG level.
# WARNING: may expose sensitive data. Never enable in production.
log.debug.payload=false
